                        description: ""
                    description: ""
                description: A firewall rejected the request
              examples:
                objectExample:
                  summary: PayloadForbidden
                  value: |
                    <?xml version="1.0" encoding="UTF-8"?>
                    <errorResponse>
                        <code>PAYLOAD_FORBIDDEN</code>
                        <message>A firewall rejected the request”</message>
                    </errorResponse>
        "500":
          description: ""
