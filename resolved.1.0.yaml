    CustomsDeclarationsFileUploadResponseExample:
      summary: CustomsDeclarationsFileUploadResponse
      value: |
        <FileUploadResponse xmlns="hmrc:fileupload">
          <Files>
            <File>
              <Reference>63acb547-85d4-4ce7-b702-05115ed99521</Reference>
              <UploadRequest>
