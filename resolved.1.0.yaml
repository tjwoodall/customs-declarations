    CustomsDeclarationsRequestBodyExample:
      summary: CustomsDeclarationsRequestBody
      value: "<md:MetaData xmlns:md=\"urn:wco:datamodel:WCO:DocumentMetaData-DMS:2\"\
        \n           xmlns=\"urn:wco:datamodel:WCO:DEC-DMS:2\"\n           xmlns:clm63055=\"\
        urn:un:unece:uncefact:codelist:standard:UNECE:AgencyIdentificationCode:D12B\"\
        \n           xmlns:ds=\"urn:wco:datamodel:WCO:MetaData_DS-DMS:2\"\n      \
        \     xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n          \
        \ xsi:schemaLocation=\"urn:wco:datamodel:WCO:DocumentMetaData-DMS:2 ../DocumentMetaData_2_DMS.xsd\
        \ \">\n<md:WCODataModelVersionCode>3.6</md:WCODataModelVersionCode>\n<md:WCOTypeName>DEC</md:WCOTypeName>\n\
        <md:ResponsibleCountryCode>GB</md:ResponsibleCountryCode>\n<md:ResponsibleAgencyName>HMRC</md:ResponsibleAgencyName>\n\
        <md:AgencyAssignedCustomizationVersionCode>v2.1</md:AgencyAssignedCustomizationVersionCode>\n\
        <Declaration xmlns:clm5ISO42173A=\"urn:un:unece:uncefact:codelist:standard:ISO:ISO3AlphaCurrencyCode:2012-08-31\"\
        \n           xmlns:p1=\"urn:wco:datamodel:WCO:Declaration_DS:DMS:2\"\n   \
        \        xmlns:udt=\"urn:un:unece:uncefact:data:standard:UnqualifiedDataType:6\"\
        \n           xsi:schemaLocation=\"urn:wco:datamodel:WCO:DEC-DMS:2 ../WCO_DEC_2_DMS.xsd\
        \ \">\n<!--Type D pre-lodged declaration with procedure code 1040, additional\
        \ procedure code 000. \nNo control,Inventory linked Type D Maritime declaration\
        \ with one MUCR and one DUCR, arrived, shut and departed at MUCR level.\n\
        Goods: Straw envelopes for bottles. \nData set category: B1. \nNational Additional\
        \ Code: VATZ to claim VAT zero-rating.\nScenario steps:\nLoader submits EAL\
        \ message to CDS for the declared MUCR.\nConsolidator closes the MUCR by sending\
        \ a CST message to CDS containing the MUCR\nto be closed.\nLoader sends EDL\
        \ message for MUCR to CDS to notify departure of the consolidation. \nExpected\
        \ notifications: DMSACC, DMSCLE, DMSEOG, DMSRCV, DMSRCV2, DMSRES. \nEMR Message\
        \ also expected response from ILE, as MUCR and DUCR consolidated in the declaration.\
        \ \n-->\n<!--Function Code of 9 to represent an original declaration. -->\n\
        <FunctionCode>9</FunctionCode>\n<!--DE 2/5: LRN\nThe trader assigned reference\
        \ to the declaration. -->\n<FunctionalReferenceID>TT_EX01A_HH020301</FunctionalReferenceID>\n\
        <!-- The IssueDateTime element is not required for any declarations. This\
        \ was included for internal testing.-->\n<IssueDateTime>\n<p1:DateTimeString\
        \ formatCode=\"304\">20210302104604+01</p1:DateTimeString>\n</IssueDateTime>\n\
        <!--DE 1/1: Declaration Type. \nEX to represent an Export declaration. -->\n\
        <!--DE 1/2: Additional Declaration Type. \nD to represent a Pre lodged declaration.\
        \ -->\n<TypeCode>EXD</TypeCode>\n<!--DE 1/9: Total Number of Items. -->\n\
        <GoodsItemQuantity>1</GoodsItemQuantity>\n<!--DE 6/18: Total Packages. -->\n\
        <TotalPackageQuantity>10</TotalPackageQuantity>\n<!--DE 7/14: Identity of\
        \ active means of transport crossing the border. -->\n<BorderTransportMeans>\n\
        <ID>CSCLGLOBE</ID>\n<IdentificationTypeCode>11</IdentificationTypeCode>\n\
        <!--DE 7/15: Nationality of active means of transport crossing the border.\n\
        In this the case country code for GB. -->\n<RegistrationNationalityCode>GB</RegistrationNationalityCode>\n\
        <!--DE 7/4: Mode of Transport at the Border.\nModeCode of 1 to represent Maritime/Sea\
        \ transport. -->\n<ModeCode>1</ModeCode>\n</BorderTransportMeans>\n<Consignment>\n\
        <!--DE 3/32: Carrier Identification number. \nThis is Security and Safety\
        \ Data. -->\n<Carrier>\n<ID>GB025115100010</ID>\n</Carrier>\n<!--DE 4/2: Transport\
        \ charges method of payment. \nD indicating other e.g. direct debit to cash\
        \ account. \nThis is Security and Safety Data. -->\n<Freight>\n<PaymentMethodCode>D</PaymentMethodCode>\n\
        </Freight>\n<!--DE 5/18: Country of Routing Codes. \nGBCAUS Routing from GB\
        \ to US via Canada. \nThis is Security and Safety Data. -->\n<Itinerary>\n\
        <SequenceNumeric>1</SequenceNumeric>\n<RoutingCountryCode>GB</RoutingCountryCode>\n\
        </Itinerary>\n<Itinerary>\n<SequenceNumeric>2</SequenceNumeric>\n<RoutingCountryCode>CA</RoutingCountryCode>\n\
        </Itinerary>\n<Itinerary>\n<SequenceNumeric>3</SequenceNumeric>\n<RoutingCountryCode>US</RoutingCountryCode>\n\
        </Itinerary>\n</Consignment>\n<!--DE 3/18: Declarant Identification Number.\
        \ \nEORI number of the Declarant. -->\n<Declarant>\n<ID>GB427168118378</ID>\n\
        </Declarant>\n<!--DE 5/12 Customs Office of Exit. \nIndicating Dover. -->\n\
        <ExitOffice>\n<ID>GB000040</ID>\n</ExitOffice>\n<!--DE 3/2: Exporter Identification\
        \ Number. \nEORI number of the Exporter, the same as 3/18. -->\n<Exporter>\n\
        <ID>GB427168118378</ID>\n</Exporter>\n<GoodsShipment>\n<!--DE 3/9: Consignee\
        \ Name and Address.\n(Mandatory when DE 3/10 is not completed). \nThis is\
        \ Security and Safety Data. -->\n<Consignee>\n<Name>Packings Import Incorporated</Name>\n\
        <Address>\n<CityName>New York</CityName>\n<CountryCode>US</CountryCode>\n\
        <Line>1 Bags Avenue</Line>\n<PostcodeID>NY1 234</PostcodeID>\n</Address>\n\
        </Consignee>\n<Consignment>\n<!--DE 7/2: Container. \n1 to indicate that the\
        \ goods are transported in containers. -->\n<ContainerCode>1</ContainerCode>\n\
        <!--DE 7/7: Identity of the means of transport at departure. \n(In this scenario,\
        \ 11 indicating name of the seagoing vessel). -->\n<DepartureTransportMeans>\n\
        <ID>CSCLGLOBE</ID>\n<IdentificationTypeCode>11</IdentificationTypeCode>\n\
        </DepartureTransportMeans>\n<GoodsLocation>\n<!--DE 5/23: Location of Goods\
        \ - Identification of location.\nID to give a unique position of the location.\
        \ \nDVRDVRDVR Indicating Dover. -->\n<Name>DVRDOVDVR</Name>\n<!--DE 5/23:\
        \ Location of Goods - Type of location.\nA in this scenario to represent that\
        \ it is a designated location. -->\n<TypeCode>A</TypeCode>\n<Address>\n<!--DE\
        \ 5/23: Location of Goods - Qualifier of the identification.\nType of ID of\
        \ the Location - U in this scenario for UN/LOCODE. -->\n<TypeCode>U</TypeCode>\n\
        <!--DE 5/23: Location of Goods - Country.\nCountry code of the country where\
        \ the goods may be examined, GB in this scenario. -->\n<CountryCode>GB</CountryCode>\n\
        </Address>\n</GoodsLocation>\n<TransportEquipment>\n<!--DE 7/10: Container\
        \ Identification Number. -->\n<SequenceNumeric>1</SequenceNumeric>\n<ID>CONU1234567</ID>\n\
        <!--DE 7/18: Seal number. \nThis is Security and Safety Data. -->\n<Seal>\n\
        <SequenceNumeric>1</SequenceNumeric>\n<ID>333</ID>\n</Seal>\n</TransportEquipment>\n\
        </Consignment>\n<Destination>\n<!--DE 5/8: Country of Destination Code.\n\
        In this case US. -->\n<CountryCode>US</CountryCode>\n</Destination>\n<!--DE\
        \ 5/14: Country of Dispatch/Export Code. \nCountry code for the country from\
        \ which the goods were originally dispatched, in this case GB. -->\n<ExportCountry>\n\
        <ID>GB</ID>\n</ExportCountry>\n<GovernmentAgencyGoodsItem>\n<!--DE 1/6: Goods\
        \ Item Number. -->\n<SequenceNumeric>1</SequenceNumeric>\n<!--DE 8/6: Statistical\
        \ Value. \nFor the goods item in GBP (£ sterling), irrespective of the currency\
        \ used in Invoice Currency. -->\n<StatisticalValueAmount currencyID=\"GBP\"\
        >200</StatisticalValueAmount>\n<!--DE 8/5 Nature of Transaction. \nEnter,\
        \ a 2-digit code (second digit is optional).\nThe single digit codes listed\
        \ in column A of the table provided for under Article 10(2) of Commission\
        \ Regulation (EC) No 113/2010 shall be used.\nMember States may also provide\
        \ for a second digit from the list in column B of that table to be collected.\n\
        In this case: \n- First digit (1) represents 'Transactions involving actual\
        \ or intended transfer of ownership \nfrom residents to non-residents against\
        \ financial or other compensation'. \n- Second digit (1) represents 'Outright\
        \ purchase/sale'. -->\n<TransactionNatureCode>11</TransactionNatureCode>\n\
        <!--DE 2/2: Additional Information. \n00400 Indicating Self representation\
        \ i.e. the declarant and the exporter are the same party. -->\n<AdditionalInformation>\n\
        <StatementCode>00400</StatementCode>\n<StatementDescription>EXPORTER</StatementDescription>\n\
        </AdditionalInformation>\n<Commodity>\n<!--DE 6/8: Description of Goods. -->\n\
        <Description>Straw envelopes for bottles, made of certified staw in wraps\
        \ of 1000</Description>\n<Classification>\n<!--DE 6/14: Commodity Code - Combined\
        \ Nomenclature Code. -->\n<ID>46021910</ID>\n<IdentificationTypeCode>TSP</IdentificationTypeCode>\n\
        </Classification>\n<Classification>\n<!--DE 6/17: National Additional Code.\n\
        VATZ to represent VAT 0% duty rate.\nNote that when code VATZ is used the\
        \ requirements for VAT zero-rating in the Export Declaration Completion Guide\
        \ Appendix 20 and VAT Notice 703 will apply. -->\n<ID>VATZ</ID>\n<IdentificationTypeCode>GN</IdentificationTypeCode>\n\
        </Classification>\n<GoodsMeasure>\n<!--DE 6/5: Gross Mass.\nWeight of the\
        \ goods in kilograms including packaging. -->\n<GrossMassMeasure>10</GrossMassMeasure>\n\
        <!--DE 6/1: Net Mass.\nWeight of the goods in kilograms without any packaging.\
        \ -->\n<NetNetWeightMeasure>5</NetNetWeightMeasure>\n</GoodsMeasure>\n</Commodity>\n\
        <GovernmentProcedure>\n<!--DE 1/10: Procedure. \nRequested Procedure of 10\
        \ 40 indicating permanent export of goods in free circulation and home use.\
        \ -->\n<CurrentCode>10</CurrentCode>\n<PreviousCode>40</PreviousCode>\n</GovernmentProcedure>\n\
        <GovernmentProcedure>\n<!--DE 1/11: Additional Procedure Code. \n000 to indicate\
        \ no additional procedure. -->\n<CurrentCode>000</CurrentCode>\n</GovernmentProcedure>\n\
        <Packaging>\n<SequenceNumeric>1</SequenceNumeric>\n<!--DE 6/11: Shipping Marks.\
        \ -->\n<MarksNumbersID>2379261ETT</MarksNumbersID>\n<!--DE 6/10: Number of\
        \ Packages. \nIn this case 10. -->\n<QuantityQuantity>10</QuantityQuantity>\n\
        <!--DE 6/9: Type of Packages.\nPK to represent standard packaging unit. -->\n\
        <TypeCode>PK</TypeCode>\n</Packaging>\n</GovernmentAgencyGoodsItem>\n<!--DE\
        \ 2/1: Simplified Declaration/ Previous Documents. \nTo show the DUCR assigned\
        \ to the consignment.\nThis is a mandatory field. -->\n<PreviousDocument>\n\
        <CategoryCode>Z</CategoryCode>\n<ID>1GB427168118378-0203N1</ID>\n<TypeCode>DCR</TypeCode>\n\
        <LineNumeric>1</LineNumeric>\n</PreviousDocument>\n<!--DE 2/1: Simplified\
        \ Declaration/ Previous Documents. \nTo show the MUCR assigned to the consignment.\
        \ -->\n<PreviousDocument>\n<CategoryCode>Z</CategoryCode>\n<ID>GB/123456789012-0203N1</ID>\n\
        <TypeCode>MCR</TypeCode>\n</PreviousDocument>\n</GoodsShipment>\n</Declaration>\n\
        </md:MetaData>\n"
    CustomsDeclarationsCancellationRequestBodyExample:
      summary: CustomsDeclarationsCancellationRequestBody
      value: |
        <md:MetaData
              xmlns="urn:wco:datamodel:WCO:DEC-DMS:2"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xmlns:clm63055="urn:un:unece:uncefact:codelist:standard:UNECE:AgencyIdentificationCode:D12B"
              xmlns:ds="urn:wco:datamodel:WCO:MetaData_DS-DMS:2"
              xmlns:md="urn:wco:datamodel:WCO:DocumentMetaData-DMS:2"
              xsi:schemaLocation="urn:wco:datamodel:WCO:DocumentMetaData-DMS:2 ../DocumentMetaData_2_DMS.xsd "
            >
            <md:WCODataModelVersionCode>3.6</md:WCODataModelVersionCode>
            <md:WCOTypeName>DEC</md:WCOTypeName>
            <md:ResponsibleCountryCode>GB</md:ResponsibleCountryCode>
            <md:ResponsibleAgencyName>HMRC</md:ResponsibleAgencyName>
            <md:AgencyAssignedCustomizationVersionCode>v2.1</md:AgencyAssignedCustomizationVersionCode>
                    <Declaration xsi:schemaLocation="urn:wco:datamodel:WCO:DEC-DMS:2 ../WCO_DEC_2_DMS.xsd " xmlns:clm5ISO42173A="urn:un:unece:uncefact:codelist:standard:ISO:ISO3AlphaCurrencyCode:2012-08-31" xmlns:p1="urn:wco:datamodel:WCO:Declaration_DS:DMS:2" xmlns:udt="urn:un:unece:uncefact:data:standard:UnqualifiedDataType:6">
                      <!--This is an example of a cancellation message that has been applied to a declaration-->

                       <!--Function Code of 13 to represent Request (Additional Message)-->
           <FunctionCode>13</FunctionCode>
           <!--The trader assigned reference to the additional message.
                       Note that this reference is independent of the declaration.-->
                       <FunctionalReferenceID>TT_IM10b_v4.9_0909_01</FunctionalReferenceID>
                       <!--Declaration ID of the corresponding Declaration to be cancelled-->
           <ID>20GBDPQ8A31WX1XXR5</ID>
           <!--Defines the type of additional message - in this scenario, INV
                       to indicate that this additional message is a cancellation-->
                       <TypeCode>INV</TypeCode>
                       <AdditionalInformation>
           <!--Textual description of the reason for cancellation-->
                    <StatementDescription>Declaration is no longer required</StatementDescription>
        <!--The type of Additional Information. 'AES' should always be used
                          for Cancellations and Amendments to indicate a free text reason
                          is being provided.-->
                          <StatementTypeCode>AES</StatementTypeCode>
                          <Pointer>
                             <SequenceNumeric>1</SequenceNumeric>
                             <DocumentSectionCode>42A</DocumentSectionCode>
                          </Pointer>
                          <Pointer>
                             <SequenceNumeric>1</SequenceNumeric>
                             <DocumentSectionCode>06A</DocumentSectionCode>
                          </Pointer>
                       </AdditionalInformation>
                       <Amendment>
           <!--Used to indicate the reason for the amendment - in this scenario,
                       a code of 1 to indicate that the Declaration is to be Cancelled. -->
                          <ChangeReasonCode>1</ChangeReasonCode>
                       </Amendment>
                    </Declaration>
                             </md:MetaData>
