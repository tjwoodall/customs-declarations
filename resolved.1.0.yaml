        <FunctionalReferenceID>TT_IM10a_1102_001</FunctionalReferenceID>\n<ID>21GB1NEXFX6SU9C4R1</ID>\n\
        <TypeCode>GPR</TypeCode>\n<!--Note that Submitter/ID should not be needed\
