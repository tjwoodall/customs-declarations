  /customs/declarations/file-upload:
    post:
      tags:
      - Endpoints
      summary: Submit an upload initiate request
      description: "Obtain a signed URL to upload files to.\n\nThe SuccessRedirect\
        \ and ErrorRedirect fields are optional.\n\nIf you provide them when you POST\
        \ your file, then the response will be an automatic redirect. \n\nIf you do\
        \ not require these redirects for your application, then do not provide these\
        \ redirect fields.\n\n### File upload workflow\nOnce you receive a successful\
        \ response from this endpoint, use the information in the response to POST\
        \ your file to the URL provided.\n\nYou must use multipart encoding (multipart/form-data)\
        \ NOT application/x-www-form-urlencoded.\n\nThe 'file' field must be the last\
        \ field in the submitted form.\n\n**Error scenarios**\n\n<table>\n  <tbody>\n\
        \    <tr>\n      <td><b>Scenario</b></td>\n      <td><b>HTTP Status</b></td>\n\
        \      <td><b>Code</b></td>\n    </tr>\n    <tr>\n      <td>Invalid XML Payload</td>\n\
        \      <td>400 (Bad Request)</td>\n      <td>BAD_REQUEST</td>\n    </tr>\n\
        \    <tr>\n      <td>A firewall rejected the request</td>\n      <td>403 (Payload\
        \ Forbidden)</td>\n      <td>PAYLOAD_FORBIDDEN</td>\n    </tr>\n    <tr>\n\
        \      <td>Internal server error</td>\n      <td>500 (Internal Server Error)</td>\n\
        \      <td>INTERNAL_SERVER_ERROR</td>\n    </tr>\n  </tbody>\n</table>\n\n\
        For error scenarios that are common across all APIs, and for error formats,\
        \ see our [reference guide](/api-documentation/docs/reference-guide#errors)\
        \ for more on errors.\n"
      operationId: Submitanuploadinitiaterequest
      parameters:
      - name: Accept
        in: header
        description: "Specifies the version of the API that you want to call. See\
          \ [versioning](/api-documentation/docs/reference-guide#versioning)."
        required: true
        style: simple
        explode: false
        schema:
          type: string
          example: application/vnd.hmrc.1.0+xml
      - name: Content-Type
        in: header
        description: Specifies the format of the request body. Must be "application/xml;
          charset=UTF-8" or the request will be rejected with HTTP status code 415.
        required: true
        style: simple
        explode: false
        schema:
          type: string
          example: application/xml; charset=UTF-8
      - name: X-Badge-Identifier
        in: header
        description: |-
          Represents the end-user who is interacting with the subscribed application.

          CSPs must have an X-Badge-Identifier or X-Submitter-Identifier.

          Must be 6 to 12 characters, consisting of any combination of numeric digits and/or upper-case letters.
        required: false
        style: simple
        explode: false
        schema:
          type: string
          example: ABC123
      - name: X-Eori-Identifier
        in: header
        description: |-
          The EORI associated with the originating owner of the declaration.

          CSPs must have an X-Badge-Identifier or X-Eori-Identifier.

          Must be numbers and letters with a maximum length of 17 characters.
        required: false
        style: simple
        explode: false
        schema:
          type: string
          example: GB123456789000
      requestBody:
        description: ""
        content:
          application/xml:
            schema:
              required:
              - FileUploadRequest
              type: object
              properties:
                FileUploadRequest:
                  required:
                  - DeclarationID
                  - FileGroupSize
                  - Files
                  type: object
                  properties:
                    DeclarationID:
                      maxLength: 22
                      minLength: 1
                      type: string
                      xml:
                        name: DeclarationID
                        namespace: hmrc:fileupload
                        prefix: default
                        attribute: false
                        wrapped: false
                    FileGroupSize:
                      minimum: 0
                      exclusiveMinimum: true
                      type: integer
                      format: int32
                      xml:
                        name: FileGroupSize
                        namespace: hmrc:fileupload
                        prefix: default
                        attribute: false
                        wrapped: false
                    Files:
                      required:
                      - File
                      type: object
                      properties:
                        File:
                          type: array
                          description: ""
                          xml:
                            namespace: hmrc:fileupload
                            prefix: default
                            attribute: false
                            wrapped: false
                          items:
                            title: FileType
                            required:
                            - FileSequenceNo
                            type: object
                            properties:
                              FileSequenceNo:
                                minimum: 0
                                exclusiveMinimum: true
                                type: integer
                                format: int32
                                xml:
                                  name: FileSequenceNo
                                  namespace: hmrc:fileupload
                                  prefix: default
                                  attribute: false
                                  wrapped: false
                              DocumentType:
                                type: string
                                xml:
                                  name: DocumentType
                                  namespace: hmrc:fileupload
                                  prefix: default
                                  attribute: false
                                  wrapped: false
                              SuccessRedirect:
                                type: string
                                xml:
                                  name: SuccessRedirect
                                  namespace: hmrc:fileupload
                                  prefix: default
                                  attribute: false
                                  wrapped: false
                              ErrorRedirect:
                                type: string
                                xml:
                                  name: ErrorRedirect
                                  namespace: hmrc:fileupload
                                  prefix: default
                                  attribute: false
                                  wrapped: false
                            description: ""
                            xml:
                              name: FileType
                              namespace: hmrc:fileupload
                              prefix: default
                              attribute: false
                              wrapped: false
                      description: ""
                  description: ""
            examples:
              objectExample:
                $ref: '#/components/examples/CustomsDeclarationsFileUploadRequestBodyExample'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/xml:
              schema:
                required:
                - FileUploadResponse
                type: object
                properties:
                  FileUploadResponse:
                    required:
                    - Files
                    type: object
                    properties:
                      Files:
                        required:
                        - File
                        type: object
                        properties:
                          File:
                            type: array
                            description: ""
                            xml:
                              namespace: hmrc:fileupload
                              prefix: default
                              attribute: false
                              wrapped: false
                            items:
                              title: File
                              required:
                              - Reference
                              - UploadRequest
                              type: object
                              properties:
                                Reference:
                                  type: string
                                  xml:
                                    name: Reference
                                    namespace: hmrc:fileupload
                                    prefix: default
                                    attribute: false
                                    wrapped: false
                                UploadRequest:
                                  required:
                                  - Fields
                                  - Href
                                  type: object
                                  properties:
                                    Href:
                                      type: string
                                      xml:
                                        name: Href
                                        namespace: hmrc:fileupload
                                        prefix: default
                                        attribute: false
